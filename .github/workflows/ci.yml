name: CI — Lint, Type-check & DB Migration Guard

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

jobs:
  backend:
    name: Backend — Lint + Migration Dry-Run
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qrave_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qrave_test
      DATABASE_READ_URL: postgresql://postgres:postgres@localhost:5432/qrave_test
      DATABASE_WRITE_URL: postgresql://postgres:postgres@localhost:5432/qrave_test
      NODE_ENV: test
      JWT_SECRET: ci_test_jwt_secret
      SESSION_SECRET: ci_test_session_secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      # DB migration guard: dry-run to catch schema drift before deploy
      - name: Check pending migrations (drizzle-kit)
        run: npx drizzle-kit check
        working-directory: backend
        continue-on-error: false  # FAIL the CI if migrations are out of sync

      # Apply migrations to the test DB to verify they run cleanly
      - name: Apply migrations (smoke test)
        run: npx drizzle-kit migrate
        working-directory: backend

      - name: Run backend tests
        run: npm test --if-present
        working-directory: backend

  frontend:
    name: Frontend — Type-check + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: client

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: client

      - name: Build production bundle
        run: npm run build
        working-directory: client
