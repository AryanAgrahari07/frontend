[databases]
; Define the database mapping. We default to 'postgres' pointing directly to PostgreSQL
postgres = host=db port=5432 dbname=postgres

[pgbouncer]
listen_port = 6432
listen_addr = *

; Authentication method and file
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Admin users allowed to run administrative console commands on pgbouncer
admin_users = postgres

; Pool Mode:
; 1. session: (Default) Connection assigned to client until client disconnects
; 2. transaction: Connection assigned to client until transaction finishes (Best for high concurrency REST APIs)
; 3. statement: Connection assigned to client for a single statement
pool_mode = transaction

; Maximum number of connections per pool (e.g., between PgBouncer and PostgreSQL)
default_pool_size = 20

; Maximum total client connections PgBouncer can handle at once
max_client_conn = 1000

; How long a client is allowed to stay in the queue waiting for a backend connection
query_wait_timeout = 120

; Set to true if PgBouncer is running behind a proxy like HAProxy
; client_tls_sslmode = disable

; Ignore startup parameters that node-postgres might send but PgBouncer does not support natively
ignore_startup_parameters = extra_float_digits, application_name
